<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Signal Dashboard</title>
<style>
body{
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background:#f4f6fb;
  padding:40px;
}
.container{
  max-width:650px;
  margin:auto;
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
h2{
  text-align:center;
  color:#2f55ff;
  margin-bottom:20px;
  font-weight:bold;
}
input, select, textarea{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:15px;
}
textarea{
  height:90px;
}
button{
  width:100%;
  padding:14px;
  margin-top:15px;
  background:#2f55ff;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}
button:hover{
  background:#1c3fd1;
}
.status{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
  color:#2f55ff;
}
#history{
  margin-top:30px;
  border-top:1px solid #ccc;
  padding-top:15px;
}
.signal-entry{
  background:#f0f3ff;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  font-family:'Courier New', monospace;
  line-height:1.5em;
}
.signal-entry a{
  color:#2f55ff;
  text-decoration:none;
}
.signal-entry a:hover{
  text-decoration:underline;
}
#performance{
  margin-top:30px;
  padding:15px;
  background:#e8eaff;
  border-radius:8px;
  font-family:'Courier New', monospace;
}
#performance h3{
  margin-top:0;
  color:#2f55ff;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h2>Elite Trade Setup</h2>

<input id="pair" placeholder="Pair (Example: XAUUSD)">
<select id="type">
  <option>Buy</option>
  <option>Sell</option>
  <option>Buy Limit</option>
  <option>Sell Limit</option>
</select>
<input id="entry" placeholder="Entry Price">
<input id="sl" placeholder="Stop Loss">
<input id="tp" placeholder="Take Profit">
<textarea id="reason" placeholder="Trade Setup Reason"></textarea>
<input id="chartUrl" placeholder="Chart / TradingView URL (Optional)">
<select id="result">
  <option value="">Result (Optional)</option>
  <option>Win</option>
  <option>Loss</option>
  <option>Break-even</option>
</select>
<button onclick="sendSignal()">Publish Signal</button>

<div class="status" id="status"></div>

<div id="history">
<h3>Signal History</h3>
<div id="historyList"></div>
</div>

<div id="performance">
<h3>Performance Summary</h3>
<div id="performanceStats"></div>
</div>

</div>

<script>
// --- Config ---
const token="8455897411:AAGdiajpZSQkXOJgs6RWvKj01Hel-b5SmAA";
const chat_id="-1003889484238";
const thread_id=2; // Elite Trade Setups topic

// --- Load history ---
let signals = JSON.parse(localStorage.getItem('signals')) || [];
updateHistory();
updatePerformance();

// --- Send signal ---
function sendSignal(){
  const pair=document.getElementById("pair").value.trim();
  const type=document.getElementById("type").value;
  const entry=document.getElementById("entry").value.trim();
  const sl=document.getElementById("sl").value.trim();
  const tp=document.getElementById("tp").value.trim();
  const reason=document.getElementById("reason").value.trim();
  const chartUrl=document.getElementById("chartUrl").value.trim();
  const result=document.getElementById("result").value;

  if(!pair || !entry || !sl || !tp || !reason){
    alert("Please fill all required fields!");
    return;
  }

  const now = new Date();
  const date = now.toLocaleDateString();
  const session = getSession(now);

  let message = `ELITE TRADE SETUP

• Pair: ${pair}
• Type: ${type}
• Entry: ${entry}
• Stop Loss: ${sl}
• Take Profit: ${tp}
• Setup: ${reason}
• Date: ${date}
• Session: ${session}

👑 Generated by: The 1% Elite Traders Circle`;

  if(chartUrl) message += `\n\n🔗 Chart / Setup: ${chartUrl}`;

  // Send message to Telegram
  fetch(`https://api.telegram.org/bot${token}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      chat_id:chat_id,
      message_thread_id:thread_id,
      text:message
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.ok){
      document.getElementById("status").innerHTML="✅ Signal Sent!";
      // Save to local history
      signals.push({pair,type,entry,sl,tp,reason,date,session,chartUrl,result});
      localStorage.setItem('signals',JSON.stringify(signals));
      updateHistory();
      updatePerformance();
    } else {
      document.getElementById("status").innerHTML="❌ Failed to send";
    }
  })
  .catch(err=>{
    console.error(err);
    document.getElementById("status").innerHTML="⚠️ Error sending signal";
  });
}

// --- Determine session ---
function getSession(date){
  const hour = date.getHours();
  if(hour>=5 && hour<12) return "London";
  if(hour>=12 && hour<20) return "New York";
  return "Asia";
}

// --- Update history ---
function updateHistory(){
  const container = document.getElementById("historyList");
  container.innerHTML="";
  signals.slice().reverse().forEach(sig=>{
    let div = document.createElement("div");
    div.className="signal-entry";
    div.innerHTML = `<b>${sig.pair} | ${sig.type}</b><br>
• Entry: ${sig.entry} | SL: ${sig.sl} | TP: ${sig.tp}<br>
• Setup: ${sig.reason}<br>
• Date: ${sig.date} | Session: ${sig.session}`;
    if(sig.chartUrl){
      div.innerHTML += `<br>🔗 <a href="${sig.chartUrl}" target="_blank">Chart / Setup Link</a>`;
    }
    if(sig.result){
      div.innerHTML += `<br>• Result: ${sig.result}`;
    }
    container.appendChild(div);
  });
}

// --- Update performance ---
function updatePerformance(){
  let total=0, wins=0, losses=0, breakeven=0;
  signals.forEach(sig=>{
    if(sig.result){
      total++;
      if(sig.result=="Win") wins++;
      else if(sig.result=="Loss") losses++;
      else if(sig.result=="Break-even") breakeven++;
    }
  });
  const container = document.getElementById("performanceStats");
  if(total===0){
    container.innerHTML="No results yet.";
  } else {
    container.innerHTML=`Total Tracked Trades: ${total}<br>
Wins: ${wins}<br>
Losses: ${losses}<br>
Break-even: ${breakeven}<br>
Win Rate: ${((wins/total)*100).toFixed(1)}%`;
  }
}
</script>

</body>
</html>
