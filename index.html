<!DOCTYPE html>
<html>
<head>
<title>Elite Signal Dashboard</title>

<style>

body{
font-family:Arial;
background:#f5f7fb;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#1a4fff;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
background:#1a4fff;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0f36d1;
}

</style>
</head>

<body>

<div class="container">

<h2>Elite Trade Setup</h2>

<input id="pair" placeholder="Pair (XAUUSD)">

<select id="type">
<option>Buy</option>
<option>Sell</option>
<option>Buy Limit</option>
<option>Sell Limit</option>
</select>

<input id="entry" placeholder="Entry Price">
<input id="sl" placeholder="Stop Loss">
<input id="tp" placeholder="Take Profit">

<textarea id="reason" placeholder="Trade Setup Reason"></textarea>

<button onclick="sendSignal()">Publish Signal</button>

</div>

<script>

function sendSignal(){

let pair=document.getElementById("pair").value;
let type=document.getElementById("type").value;
let entry=document.getElementById("entry").value;
let sl=document.getElementById("sl").value;
let tp=document.getElementById("tp").value;
let reason=document.getElementById("reason").value;

let message = `
🏛 ELITE TRADE SETUP

Pair: ${pair}
Type: ${type}

Entry: ${entry}
SL: ${sl}
TP: ${tp}

Setup:
${reason}

Generated by
The 1% Elite Traders Circle
`;

let token="YOUR_BOT_TOKEN";
let chat_id="-1003889484238";

let url=`https://api.telegram.org/bot${token}/sendMessage`;

fetch(url,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:chat_id,
text:message
})
});

alert("Signal Sent To Telegram");

}

</script>

</body>
</html>
