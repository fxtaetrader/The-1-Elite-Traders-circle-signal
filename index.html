<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elite Signal Dashboard</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6fb;
padding:40px;
}

.container{
max-width:520px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#2f55ff;
margin-bottom:25px;
}

input, select, textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
height:90px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#2f55ff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1c3fd1;
}

.status{
text-align:center;
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Elite Trade Setup</h2>

<input id="pair" placeholder="Pair (Example: XAUUSD)">

<select id="type">
<option>Buy</option>
<option>Sell</option>
<option>Buy Limit</option>
<option>Sell Limit</option>
</select>

<input id="entry" placeholder="Entry Price">
<input id="sl" placeholder="Stop Loss">
<input id="tp" placeholder="Take Profit">

<textarea id="reason" placeholder="Trade Setup Reason"></textarea>

<button onclick="sendSignal()">Publish Signal</button>

<div class="status" id="status"></div>

</div>

<script>

function sendSignal(){

let pair=document.getElementById("pair").value;
let type=document.getElementById("type").value;
let entry=document.getElementById("entry").value;
let sl=document.getElementById("sl").value;
let tp=document.getElementById("tp").value;
let reason=document.getElementById("reason").value;

let message =
"🏛 ELITE TRADE SETUP\n\n"+
"📊 Pair: "+pair+"\n"+
"📈 Type: "+type+"\n\n"+
"📍 Entry: "+entry+"\n"+
"🛑 Stop Loss: "+sl+"\n"+
"🎯 Take Profit: "+tp+"\n\n"+
"📌 Setup:\n"+reason+"\n\n"+
"Generated by\n"+
"👑 The 1% Elite Traders Circle";

let token="8455897411:AAGdiajpZSQkXOJgs6RWvKj01Hel-b5SmAA";
let chat_id="-1003889484238";

let url="https://api.telegram.org/bot"+token+"/sendMessage";

fetch(url,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
chat_id:chat_id,
text:message
})
})
.then(response => response.json())
.then(data => {

console.log(data);

if(data.ok){
document.getElementById("status").innerHTML="✅ Signal Sent to Telegram!";
}else{
document.getElementById("status").innerHTML="❌ Failed to send signal";
}

})
.catch(error => {

console.error(error);
document.getElementById("status").innerHTML="⚠️ Error sending signal";

});

}

</script>

</body>
</html>
